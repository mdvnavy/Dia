<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <filter id="glowIndigo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="700" fill="#0B0E14"/>

  <!-- Title -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
    <text x="500" y="44" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#E0E0E0" letter-spacing="3">DIA — DISCOVERY INTAKE AGENT</text>
    <text x="500" y="66" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="2">GEMINI · ADK · MCP · CLOUD RUN</text>
  </g>

  <!-- ========== CLOUD RUN FRAME ========== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="0.4s" fill="freeze"/>
    <rect x="40" y="100" width="600" height="520" rx="16" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="64" y="126" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#9CA3AF" letter-spacing="2">GOOGLE CLOUD RUN</text>
  </g>

  <!-- Web UI card -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.8s" fill="freeze"/>
    <rect x="70" y="150" width="180" height="74" rx="12" fill="#6366F1" opacity="0.08"/>
    <rect x="70" y="150" width="180" height="74" rx="12" fill="none" stroke="#6366F1" stroke-width="2" filter="url(#glowIndigo)">
      <animate attributeName="stroke-opacity" values="1;0.55;1" dur="3.4s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="181" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E0E0E0">WEB UI</text>
    <text x="160" y="201" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9CA3AF">intake form · Ask DIA chat</text>
  </g>

  <!-- Hardened server card -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.1s" fill="freeze"/>
    <rect x="70" y="270" width="180" height="92" rx="12" fill="#6366F1" opacity="0.08"/>
    <rect x="70" y="270" width="180" height="92" rx="12" fill="none" stroke="#6366F1" stroke-width="2" filter="url(#glowIndigo)"/>
    <text x="160" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E0E0E0">HARDENED HTTP</text>
    <text x="160" y="316" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9CA3AF">/api/process · /api/agent</text>
    <text x="160" y="334" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280">body caps · timeouts · graceful errors</text>
  </g>

  <!-- Pipeline card -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.4s" fill="freeze"/>
    <rect x="70" y="410" width="180" height="120" rx="12" fill="#10B981" opacity="0.07"/>
    <rect x="70" y="410" width="180" height="120" rx="12" fill="none" stroke="#10B981" stroke-width="2" filter="url(#glowGreen)"/>
    <text x="160" y="438" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#E0E0E0">DETERMINISTIC PIPELINE</text>
    <text x="160" y="460" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#34D399">parse → validate → score</text>
    <text x="160" y="478" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#34D399">→ generate docs</text>
    <text x="160" y="503" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280">profile · analysis · proposal</text>
    <text x="160" y="518" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280">112 tests · adversarial e2e</text>
  </g>

  <!-- Agent card -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.7s" fill="freeze"/>
    <rect x="360" y="270" width="240" height="150" rx="12" fill="#8B5CF6" opacity="0.08"/>
    <rect x="360" y="270" width="240" height="150" rx="12" fill="none" stroke="#8B5CF6" stroke-width="2.5" filter="url(#glowPurple)">
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2.8s" begin="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="480" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#E0E0E0">GEMINI ADK AGENT</text>
    <text x="480" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#A78BFA">LlmAgent · gemini-2.5-flash</text>
    <line x1="384" y1="338" x2="576" y2="338" stroke="#4B5563" stroke-width="1"/>
    <text x="480" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9CA3AF">function tools → pipeline</text>
    <text x="480" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9CA3AF">McpToolset → toolbox</text>
    <text x="480" y="402" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280">built fresh per turn · async bridge</text>
  </g>

  <!-- Secret Manager card -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="2.0s" fill="freeze"/>
    <rect x="360" y="470" width="240" height="60" rx="12" fill="#6366F1" opacity="0.06"/>
    <rect x="360" y="470" width="240" height="60" rx="12" fill="none" stroke="#4B5563" stroke-width="1.5"/>
    <text x="480" y="496" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF">SECRET MANAGER</text>
    <text x="480" y="514" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280">GEMINI_API_KEY · MAKE_MCP_TOKEN</text>
  </g>

  <!-- ========== MAKE TOOLBOX (right side) ========== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="2.6s" fill="freeze"/>
    <rect x="700" y="100" width="260" height="420" rx="16" fill="#F59E0B" opacity="0.05"/>
    <rect x="700" y="100" width="260" height="420" rx="16" fill="none" stroke="#F59E0B" stroke-width="2" filter="url(#glowAmber)">
      <animate attributeName="stroke-opacity" values="1;0.6;1" dur="3s" begin="4s" repeatCount="indefinite"/>
    </rect>
    <text x="830" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="2">DIA AGENT TOOLBOX</text>
    <text x="830" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9CA3AF" letter-spacing="1">MAKE MCP SERVER · BEARER KEY</text>
  </g>

  <!-- Tool chips -->
  <g font-family="Inter, system-ui, sans-serif">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.0s" fill="freeze"/>
      <rect x="724" y="172" width="212" height="54" rx="10" fill="#0B0E14" stroke="#EF4444" stroke-width="1.5"/>
      <text x="830" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0E0">email_proposal</text>
      <text x="830" y="212" text-anchor="middle" font-size="9" fill="#6B7280">→ Gmail</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.2s" fill="freeze"/>
      <rect x="724" y="238" width="212" height="54" rx="10" fill="#0B0E14" stroke="#10B981" stroke-width="1.5"/>
      <text x="830" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0E0">record_lead_in_sheet</text>
      <text x="830" y="278" text-anchor="middle" font-size="9" fill="#6B7280">→ Google Sheets</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.4s" fill="freeze"/>
      <rect x="724" y="304" width="212" height="54" rx="10" fill="#0B0E14" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="830" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0E0">save_proposal_to_drive</text>
      <text x="830" y="344" text-anchor="middle" font-size="9" fill="#6B7280">→ Google Drive</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.6s" fill="freeze"/>
      <rect x="724" y="370" width="212" height="54" rx="10" fill="#0B0E14" stroke="#6366F1" stroke-width="1.5"/>
      <text x="830" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0E0">enrich_prospect_website</text>
      <text x="830" y="410" text-anchor="middle" font-size="9" fill="#6B7280">→ HTTP</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.8s" fill="freeze"/>
      <rect x="724" y="436" width="212" height="54" rx="10" fill="#0B0E14" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="830" y="458" text-anchor="middle" font-size="11" font-weight="600" fill="#E0E0E0">escalate_to_human</text>
      <text x="830" y="476" text-anchor="middle" font-size="9" fill="#6B7280">→ Gmail (reviewer)</text>
    </g>
  </g>

  <!-- ========== CONNECTIONS ========== -->
  <line x1="160" y1="224" x2="160" y2="270" stroke="#6366F1" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.2s" fill="freeze"/>
  </line>
  <line x1="160" y1="362" x2="160" y2="410" stroke="#10B981" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.5s" fill="freeze"/>
  </line>
  <line x1="250" y1="316" x2="360" y2="330" stroke="#8B5CF6" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.8s" fill="freeze"/>
  </line>
  <line x1="360" y1="400" x2="250" y2="450" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4 4" opacity="0">
    <animate attributeName="opacity" values="0;0.7" dur="0.5s" begin="2.1s" fill="freeze"/>
  </line>
  <line x1="480" y1="470" x2="480" y2="420" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="3 4" opacity="0">
    <animate attributeName="opacity" values="0;0.7" dur="0.5s" begin="2.2s" fill="freeze"/>
  </line>

  <!-- THE MCP LINK: agent to toolbox, animated flow -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="4.2s" fill="freeze"/>
    <line x1="600" y1="340" x2="700" y2="320" stroke="#F59E0B" stroke-width="3.5" stroke-dasharray="10 7" filter="url(#glowAmber)">
      <animate attributeName="stroke-dashoffset" values="0;-68" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <text x="650" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" letter-spacing="1">MCP</text>
    <text x="650" y="352" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#9CA3AF">streamable HTTP</text>
  </g>

  <!-- Footer -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="4.8s" fill="freeze"/>
    <text x="500" y="668" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#4B5563" letter-spacing="1">THE AGENT DECIDES · THE TOOLBOX ACTS · THE CREDENTIALS NEVER LEAVE MAKE</text>
  </g>
</svg>
