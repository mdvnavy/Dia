<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>DIA — Discovery Intake Agent architecture</title>
  <desc>Web UI and hardened HTTP core on Cloud Run feed a deterministic intake pipeline; a Gemini ADK agent uses MCP to act through the Make DIA Agent Toolbox of five scoped tools.</desc>
  <defs>
    <filter id="glowIndigo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowEmerald" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#6366F1" opacity="0.9"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#8B5CF6" opacity="0.9"/>
    </marker>
    <marker id="arrowEmerald" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#10B981" opacity="0.9"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#F59E0B" opacity="0.9"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#94A3B8" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#0F172A"/>

  <!-- Grid -->
  <g id="grid" opacity="0.10" stroke="#94A3B8" stroke-width="0.5">
    <path d="M 50 95 H 750 M 50 170 H 750 M 50 245 H 750 M 50 320 H 750 M 50 395 H 750 M 50 470 H 750 M 50 545 H 750"/>
    <path d="M 60 95 V 545 M 140 95 V 545 M 220 95 V 545 M 330 95 V 545 M 500 95 V 545 M 560 95 V 545 M 740 95 V 545"/>
  </g>

  <!-- Title -->
  <g id="title" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.6s" fill="freeze"/>
    <text x="400" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800" fill="#E0E0E0" letter-spacing="2.2">DIA — DISCOVERY INTAKE AGENT</text>
    <text x="400" y="62" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9CA3AF" letter-spacing="2.6">GEMINI · ADK · MCP · CLOUD RUN</text>
  </g>

  <!-- Cloud Run frame -->
  <g id="cloud-run-frame" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>
    <rect x="48" y="88" width="472" height="442" rx="8" fill="none" stroke="#4B5563" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="64" y="108" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" letter-spacing="1.8">GOOGLE CLOUD RUN</text>
  </g>

  <!-- ===== LEFT COLUMN ===== -->
  <g id="web-ui-card" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.45s" fill="freeze"/>
    <rect x="60" y="122" width="160" height="78" rx="8" fill="#0F172A" stroke="#6366F1" stroke-width="2" filter="url(#glowIndigo)"/>
    <rect x="60" y="122" width="160" height="78" rx="8" fill="#6366F1" opacity="0.08"/>
    <text x="140" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#E0E0E0" letter-spacing="1.3">INTAKE</text>
    <text x="140" y="168" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#6366F1" letter-spacing="1.8">WEB UI</text>
    <text x="140" y="186" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#9CA3AF">questionnaire · Ask DIA chat</text>
  </g>

  <g id="http-core-card" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.45s" fill="freeze"/>
    <rect x="60" y="240" width="160" height="78" rx="8" fill="#0F172A" stroke="#6366F1" stroke-width="2" filter="url(#glowIndigo)"/>
    <rect x="60" y="240" width="160" height="78" rx="8" fill="#6366F1" opacity="0.08"/>
    <text x="140" y="266" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#E0E0E0" letter-spacing="1.3">HARDENED</text>
    <text x="140" y="286" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#6366F1" letter-spacing="1.8">HTTP CORE</text>
    <text x="140" y="304" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#9CA3AF">/api/process · /api/agent</text>
  </g>

  <g id="pipeline-card" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.45s" fill="freeze"/>
    <rect x="60" y="358" width="160" height="92" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#glowEmerald)"/>
    <rect x="60" y="358" width="160" height="92" rx="8" fill="#10B981" opacity="0.07"/>
    <text x="140" y="384" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#E0E0E0" letter-spacing="1.3">DETERMINISTIC</text>
    <text x="140" y="404" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#10B981" letter-spacing="1.8">PIPELINE</text>
    <text x="140" y="422" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#6EE7B7">parse · validate · score · docs</text>
    <text x="140" y="438" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#9CA3AF">112 tests · adversarial e2e</text>
  </g>

  <g id="secret-manager-card" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.45s" fill="freeze"/>
    <rect x="60" y="478" width="160" height="38" rx="6" fill="#0F172A" stroke="#4B5563" stroke-width="1.5"/>
    <text x="140" y="494" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#9CA3AF" letter-spacing="1.2">SECRET MANAGER</text>
    <text x="140" y="508" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#4B5563">gemini key · toolbox token</text>
  </g>

  <!-- ===== CENTER: AGENT ===== -->
  <g id="agent-card" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.5s" fill="freeze"/>
    <rect x="330" y="250" width="170" height="120" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2.5" filter="url(#glowPurple)">
      <animate attributeName="stroke-opacity" values="1;0.55;1" dur="3s" begin="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="330" y="250" width="170" height="120" rx="8" fill="#8B5CF6" opacity="0.08"/>
    <text x="415" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#E0E0E0" letter-spacing="1.3">GEMINI ADK</text>
    <text x="415" y="302" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#8B5CF6" letter-spacing="1.8">AGENT</text>
    <text x="415" y="322" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#C4B5FD">gemini-2.5-flash · LlmAgent</text>
    <text x="415" y="338" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#9CA3AF">function tools + McpToolset</text>
    <text x="415" y="354" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#4B5563">built fresh per turn</text>
  </g>

  <!-- ===== RIGHT: TOOLBOX ===== -->
  <g id="toolbox-panel" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.5s" fill="freeze"/>
    <rect x="560" y="95" width="180" height="450" rx="8" fill="#F59E0B" opacity="0.05"/>
    <rect x="560" y="95" width="180" height="450" rx="8" fill="none" stroke="#F59E0B" stroke-width="2" filter="url(#glowAmber)">
      <animate attributeName="stroke-opacity" values="1;0.6;1" dur="3.2s" begin="5s" repeatCount="indefinite"/>
    </rect>
    <text x="650" y="121" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#F59E0B" letter-spacing="1.6">DIA AGENT TOOLBOX</text>
    <text x="650" y="137" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#FCD34D" letter-spacing="1.2">MAKE MCP SERVER</text>
  </g>

  <g id="tool-chips" font-family="Inter, system-ui, sans-serif">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.35s" fill="freeze"/>
      <rect x="576" y="155" width="148" height="60" rx="6" fill="#0F172A" stroke="#6366F1" stroke-width="1.5"/>
      <text x="650" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#E0E0E0">email_proposal</text>
      <text x="650" y="198" text-anchor="middle" font-size="9" font-weight="600" fill="#6366F1">→ Gmail</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.35s" fill="freeze"/>
      <rect x="576" y="231" width="148" height="60" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="1.5"/>
      <text x="650" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#E0E0E0">record_lead_in_sheet</text>
      <text x="650" y="274" text-anchor="middle" font-size="9" font-weight="600" fill="#6EE7B7">→ Google Sheets</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.35s" fill="freeze"/>
      <rect x="576" y="307" width="148" height="60" rx="6" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="650" y="332" text-anchor="middle" font-size="10" font-weight="700" fill="#E0E0E0">save_proposal_to_drive</text>
      <text x="650" y="350" text-anchor="middle" font-size="9" font-weight="600" fill="#FCD34D">→ Google Drive</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.35s" fill="freeze"/>
      <rect x="576" y="383" width="148" height="60" rx="6" fill="#0F172A" stroke="#C4B5FD" stroke-width="1.5"/>
      <text x="650" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#E0E0E0">enrich_website</text>
      <text x="650" y="426" text-anchor="middle" font-size="9" font-weight="600" fill="#C4B5FD">→ HTTP</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.35s" fill="freeze"/>
      <rect x="576" y="459" width="148" height="60" rx="6" fill="#0F172A" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="650" y="484" text-anchor="middle" font-size="10" font-weight="700" fill="#E0E0E0">escalate_to_human</text>
      <text x="650" y="502" text-anchor="middle" font-size="9" font-weight="600" fill="#8B5CF6">→ Gmail · reviewer</text>
    </g>
  </g>

  <!-- ===== CONNECTORS ===== -->
  <g id="ui-to-core" opacity="0">
    <animate attributeName="opacity" from="0" to="0.72" begin="1.1s" dur="0.45s" fill="freeze"/>
    <line x1="140" y1="200" x2="140" y2="234" stroke="#6366F1" stroke-width="1.2" marker-end="url(#arrowIndigo)"/>
  </g>
  <g id="core-to-pipeline" opacity="0">
    <animate attributeName="opacity" from="0" to="0.72" begin="1.4s" dur="0.45s" fill="freeze"/>
    <line x1="140" y1="318" x2="140" y2="352" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowEmerald)"/>
  </g>
  <g id="core-to-agent" opacity="0">
    <animate attributeName="opacity" from="0" to="0.72" begin="2.2s" dur="0.45s" fill="freeze"/>
    <line x1="220" y1="290" x2="324" y2="300" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  </g>
  <g id="agent-to-pipeline" opacity="0">
    <animate attributeName="opacity" from="0" to="0.72" begin="2.4s" dur="0.45s" fill="freeze"/>
    <polyline points="330,350 280,350 280,400 226,400" fill="none" stroke="#10B981" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowEmerald)"/>
    <text x="280" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#6EE7B7">tools</text>
  </g>
  <g id="secrets-to-agent" opacity="0">
    <animate attributeName="opacity" from="0" to="0.72" begin="2.4s" dur="0.45s" fill="freeze"/>
    <polyline points="220,497 415,497 415,376" fill="none" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arrowGray)"/>
  </g>

  <!-- MCP link: agent to toolbox -->
  <g id="mcp-link" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.6s" fill="freeze"/>
    <line x1="500" y1="310" x2="552" y2="310" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="8 6" filter="url(#glowAmber)" marker-end="url(#arrowAmber)">
      <animate attributeName="stroke-dashoffset" values="0;-56" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <text x="526" y="296" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#F59E0B" letter-spacing="1.4">MCP</text>
    <text x="526" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#9CA3AF">bearer key</text>
  </g>

  <!-- Footer -->
  <g id="footer" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.8s" fill="freeze"/>
    <text x="400" y="578" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#4B5563" letter-spacing="1.4">THE AGENT DECIDES · THE TOOLBOX ACTS · CREDENTIALS NEVER LEAVE MAKE</text>
  </g>
</svg>
