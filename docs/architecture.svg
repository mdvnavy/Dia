<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <title>DIA — Agent Wiring Blueprint</title>
  <desc>Cult-branded wiring blueprint: the Gemini ADK agent at the hub, wired left to the in-process surfaces (web UI, hardened HTTP core, deterministic pipeline, Secret Manager) and right through one MCP bus to the Make DIA Agent Toolbox of five scoped tools.</desc>
  <defs>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#c8a96e" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGoldBus" filterUnits="userSpaceOnUse" x="530" y="295" width="130" height="50">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#c8a96e" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#c8a96e" opacity="0.9"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#60a5fa" opacity="0.9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#4ade80" opacity="0.9"/>
    </marker>
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#6b6b76" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="700" fill="#0c0c0e"/>

  <!-- Blueprint grid -->
  <g id="grid" opacity="0.5" stroke="#1c1c1f" stroke-width="0.5">
    <path d="M 70 90 H 840 M 70 165 H 840 M 70 240 H 840 M 70 315 H 840 M 70 390 H 840 M 70 465 H 840 M 70 540 H 840 M 70 615 H 840"/>
    <path d="M 70 90 V 615 M 165 90 V 615 M 260 90 V 615 M 350 90 V 615 M 450 90 V 615 M 550 90 V 615 M 640 90 V 615 M 740 90 V 615 M 840 90 V 615"/>
  </g>

  <!-- Title block -->
  <g id="title" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.6s" fill="freeze"/>
    <text x="450" y="44" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#c8a96e" letter-spacing="-0.4">DIA — Agent Wiring Blueprint</text>
    <text x="450" y="66" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="10" font-weight="400" fill="#6b6b76" letter-spacing="1.8">GEMINI · ADK · MCP · CLOUD RUN · SECRET MANAGER</text>
  </g>

  <!-- ===== LEFT: IN-PROCESS SURFACES ===== -->
  <g id="node-web-ui" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    <rect x="70" y="110" width="190" height="64" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="86" y="136" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="11" font-weight="700" fill="#e8e8ec">web-ui</text>
    <text x="86" y="154" textLength="166" lengthAdjust="spacingAndGlyphs" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">Surface · Intake form, Ask DIA chat</text>
    <circle cx="252" cy="142" r="3" fill="#60a5fa"/>
  </g>

  <g id="node-http-core" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.4s" fill="freeze"/>
    <rect x="70" y="196" width="190" height="64" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="86" y="222" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="11" font-weight="700" fill="#e8e8ec">http-core</text>
    <text x="86" y="240" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">Hardened · Caps, timeouts, /api</text>
    <circle cx="252" cy="228" r="3" fill="#60a5fa"/>
  </g>

  <g id="node-pipeline" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.4s" fill="freeze"/>
    <rect x="70" y="282" width="190" height="78" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="86" y="308" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="11" font-weight="700" fill="#e8e8ec">pipeline</text>
    <text x="86" y="326" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">Deterministic · Parse, validate,</text>
    <text x="86" y="340" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">score, generate 3 docs</text>
    <circle cx="252" cy="321" r="3" fill="#4ade80"/>
  </g>

  <g id="node-secrets" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
    <rect x="70" y="382" width="190" height="64" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="86" y="408" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="11" font-weight="700" fill="#e8e8ec">secret-manager</text>
    <text x="86" y="426" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">GCP · Gemini key, toolbox token</text>
    <circle cx="252" cy="414" r="3" fill="#6b6b76"/>
  </g>

  <g id="node-gemini" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    <rect x="70" y="468" width="190" height="64" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="86" y="494" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="11" font-weight="700" fill="#e8e8ec">gemini-api</text>
    <text x="86" y="512" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">LLM · gemini-2.5-flash turns</text>
    <circle cx="252" cy="500" r="3" fill="#f87171"/>
  </g>

  <!-- ===== CENTER HUB: THE AGENT ===== -->
  <g id="hub-agent" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.5s" fill="freeze"/>
    <rect x="350" y="250" width="200" height="140" rx="8" fill="#141416" stroke="#c8a96e" stroke-width="2" filter="url(#glowGold)">
      <animate attributeName="stroke-opacity" values="1;0.6;1" dur="3.2s" begin="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="450" y="276" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" font-weight="400" fill="#6b6b76" letter-spacing="1.6">GEMINI ADK · LLMAGENT</text>
    <text x="450" y="306" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#c8a96e" letter-spacing="-0.4">DIA Agent</text>
    <text x="450" y="330" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#e8e8ec">function tools + McpToolset</text>
    <text x="450" y="348" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="9" fill="#6b6b76">decides · delegates · reports</text>
    <text x="450" y="370" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#3a3a40" letter-spacing="1.2">RUNS ON GOOGLE CLOUD RUN</text>
  </g>

  <!-- ===== RIGHT: MAKE TOOLBOX RAIL ===== -->
  <g id="toolbox-rail" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.5s" fill="freeze"/>
    <rect x="640" y="100" width="200" height="490" rx="8" fill="#141416" opacity="0.55"/>
    <rect x="640" y="100" width="200" height="490" rx="8" fill="none" stroke="#c8a96e" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="740" y="126" text-anchor="middle" font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#c8a96e" letter-spacing="-0.2">DIA Agent Toolbox</text>
    <text x="740" y="142" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#6b6b76" letter-spacing="1.4">MAKE MCP SERVER · BEARER KEY</text>
  </g>

  <g id="tool-chips" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
      <rect x="656" y="158" width="168" height="68" rx="6" fill="#1c1c1f" stroke="#2a2a2e" stroke-width="1.5"/>
      <text x="672" y="186" font-size="10" font-weight="700" fill="#e8e8ec">email_proposal</text>
      <text x="672" y="204" font-size="9" fill="#6b6b76">Action · Gmail send</text>
      <circle cx="664" cy="195" r="2.5" fill="#f87171"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
      <rect x="656" y="245" width="168" height="68" rx="6" fill="#1c1c1f" stroke="#2a2a2e" stroke-width="1.5"/>
      <text x="672" y="273" font-size="10" font-weight="700" fill="#e8e8ec">record_lead_in_sheet</text>
      <text x="672" y="291" font-size="9" fill="#6b6b76">CRM · Google Sheets row</text>
      <circle cx="664" cy="282" r="2.5" fill="#4ade80"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.3s" fill="freeze"/>
      <rect x="656" y="332" width="168" height="68" rx="6" fill="#1c1c1f" stroke="#2a2a2e" stroke-width="1.5"/>
      <text x="672" y="360" font-size="10" font-weight="700" fill="#e8e8ec">save_proposal_to_drive</text>
      <text x="672" y="378" font-size="9" fill="#6b6b76">Artifact · Drive markdown</text>
      <circle cx="664" cy="369" r="2.5" fill="#c8a96e"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
      <rect x="656" y="419" width="168" height="68" rx="6" fill="#1c1c1f" stroke="#2a2a2e" stroke-width="1.5"/>
      <text x="672" y="447" font-size="10" font-weight="700" fill="#e8e8ec">enrich_website</text>
      <text x="672" y="465" font-size="9" fill="#6b6b76">Context · HTTP fetch</text>
      <circle cx="664" cy="456" r="2.5" fill="#60a5fa"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
      <rect x="656" y="506" width="168" height="68" rx="6" fill="#1c1c1f" stroke="#2a2a2e" stroke-width="1.5"/>
      <text x="672" y="534" font-size="10" font-weight="700" fill="#e8e8ec">escalate_to_human</text>
      <text x="672" y="552" font-size="9" fill="#6b6b76">HITL · Gmail to reviewer</text>
      <circle cx="664" cy="543" r="2.5" fill="#f87171"/>
    </g>
  </g>

  <!-- ===== WIRES ===== -->
  <g id="wires-left" fill="none">
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.75" begin="1.9s" dur="0.4s" fill="freeze"/>
      <polyline points="260,142 308,142 308,285 348,285" stroke="#60a5fa" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
      <polyline points="260,228 296,228 296,305 348,305" stroke="#60a5fa" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.75" begin="2.1s" dur="0.4s" fill="freeze"/>
      <polyline points="350,321 260,321" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="2.3s" dur="0.4s" fill="freeze"/>
      <polyline points="260,414 320,414 320,355 348,355" stroke="#6b6b76" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrowMuted)"/>
      <polyline points="260,500 380,500 380,392" stroke="#6b6b76" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrowMuted)"/>
    </g>
  </g>

  <!-- MCP bus -->
  <g id="mcp-bus" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.5s" fill="freeze"/>
    <line x1="550" y1="320" x2="637" y2="320" stroke="#c8a96e" stroke-width="2.5" stroke-dasharray="8 6" filter="url(#glowGoldBus)" marker-end="url(#arrowGold)">
      <animate attributeName="stroke-dashoffset" values="0;-56" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <text x="593" y="306" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="10" font-weight="700" fill="#c8a96e" letter-spacing="1.6">MCP</text>
    <text x="593" y="340" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#6b6b76">streamable http</text>
  </g>

  <!-- ===== STAT STRIP ===== -->
  <g id="stats" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.6s" fill="freeze"/>
    <rect x="70" y="615" width="170" height="56" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="155" y="641" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="16" font-weight="700" fill="#c8a96e">112</text>
    <text x="155" y="659" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#6b6b76" letter-spacing="1.2">TESTS PASSING</text>

    <rect x="270" y="615" width="170" height="56" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="355" y="641" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="16" font-weight="700" fill="#c8a96e">5</text>
    <text x="355" y="659" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#6b6b76" letter-spacing="1.2">SCOPED MCP TOOLS</text>

    <rect x="470" y="615" width="170" height="56" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="555" y="641" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="16" font-weight="700" fill="#c8a96e">3</text>
    <text x="555" y="659" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#6b6b76" letter-spacing="1.2">DOCS PER INTAKE</text>

    <rect x="670" y="615" width="170" height="56" rx="6" fill="#141416" stroke="#2a2a2e" stroke-width="1.5"/>
    <text x="755" y="641" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="16" font-weight="700" fill="#4ade80">0</text>
    <text x="755" y="659" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, Menlo, monospace" font-size="8" fill="#6b6b76" letter-spacing="1.2">SECRETS IN REPO</text>
  </g>
</svg>
